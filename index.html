<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="icon-512.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Spending - Wealth Magnet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .balance-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-item { animation: slideIn 0.3s ease-out forwards; }
        
        /* Fix Toast Position */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 9999;
            pointer-events: none;
        }
        
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-subtle { animation: bounce-subtle 3s infinite ease-in-out; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen shadow-2xl relative bg-slate-50 pb-10">

    <div class="balance-gradient p-8 pb-16 rounded-b-[3rem] text-white shadow-lg relative z-10">
        <div class="text-center py-4">
            <p class="text-xs uppercase tracking-widest opacity-70 mb-1 font-bold">Saldo Kelimpahan Saya</p>
            <h2 id="balance-text" class="text-4xl font-bold tracking-tight">Rp 0</h2>
            <p class="text-[10px] mt-2 italic opacity-80">"Setiap rupiah yang keluar kembali berlipat ganda."</p>
        </div>
    </div>

    <div class="flex justify-center gap-3 -mt-8 px-6 relative z-20">
        <button onclick="toggleModal('topup-modal')" class="bg-white flex-1 p-3 rounded-2xl shadow-md flex flex-col items-center">
            <div class="bg-green-100 text-green-600 p-2 rounded-full mb-1">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            </div>
            <span class="text-[10px] font-bold text-slate-600 uppercase">Top Up</span>
        </button>
        <button onclick="toggleModal('wishlist-modal')" class="bg-white flex-1 p-3 rounded-2xl shadow-md flex flex-col items-center border-2 border-indigo-100">
            <div class="bg-indigo-100 text-indigo-600 p-2 rounded-full mb-1">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            </div>
            <span class="text-[10px] font-bold text-slate-600 uppercase">Wishlist</span>
        </button>
        <button onclick="toggleModal('spend-modal')" class="bg-white flex-1 p-3 rounded-2xl shadow-md flex flex-col items-center">
            <div class="bg-blue-100 text-blue-600 p-2 rounded-full mb-1">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            </div>
            <span class="text-[10px] font-bold text-slate-600 uppercase">Spend</span>
        </button>
    </div>

    <div class="flex mt-8 px-6 border-b border-slate-200 items-center">
        <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2 font-bold text-sm tab-active uppercase tracking-tighter">Riwayat</button>
        <button onclick="switchTab('wishlist')" id="tab-wishlist" class="flex-1 py-2 font-bold text-sm text-slate-400 uppercase tracking-tighter">Wishlist ✨</button>
        <button onclick="clearHistory()" class="p-2 text-slate-300 hover:text-red-400 transition-colors" title="Mulai Hari Baru">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
    </div>

    <div id="section-history" class="px-6 mt-4 space-y-3 pb-24"></div>
    <div id="section-wishlist" class="px-6 mt-4 space-y-3 hidden pb-24"></div>

    <div id="topup-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-6">
        <div class="bg-white w-full rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Terima Kelimpahan ✨</h3>
            <input type="number" id="topup-amount" placeholder="Masukkan Nominal" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 mb-4 outline-none focus:border-green-400">
            <button onclick="processTopUp()" class="w-full bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg">TAMBAHKAN SALDO</button>
            <button onclick="toggleModal('topup-modal')" class="w-full mt-3 text-slate-400 text-sm font-semibold">BATAL</button>
        </div>
    </div>

    <div id="spend-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-6">
        <div class="bg-white w-full rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Alirkan Berkat 🎁</h3>
            <input type="text" id="spend-name" placeholder="Beli apa hari ini?" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 mb-3 outline-none focus:border-blue-400">
            <input type="number" id="spend-amount" placeholder="Nominal" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 mb-4 outline-none focus:border-blue-400">
            <button onclick="processSpend()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">BELI SEKARANG</button>
            <button onclick="toggleModal('spend-modal')" class="w-full mt-3 text-slate-400 text-sm font-semibold">BATAL</button>
        </div>
    </div>

    <div id="wishlist-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-6">
        <div class="bg-white w-full rounded-3xl p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-slate-800">Tulis Impian ✨</h3>
            <input type="text" id="wish-name" placeholder="Apa impianmu?" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 mb-3 outline-none focus:border-indigo-500">
            <input type="number" id="wish-amount" placeholder="Harga Impian" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl p-3 mb-4 outline-none focus:border-indigo-500">
            <button onclick="addWish()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg">SIMPAN KE WISHLIST</button>
            <button onclick="toggleModal('wishlist-modal')" class="w-full mt-3 text-slate-400 text-sm font-semibold">NANTI SAJA</button>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        // Database Lokal
        let balance = parseInt(localStorage.getItem('hb_balance')) || 0;
        let historyData = JSON.parse(localStorage.getItem('hb_history')) || [];
        let wishlistData = JSON.parse(localStorage.getItem('hb_wishlist')) || [];

        const affirmations = [
            "Uang yang saya keluarkan kembali 10x lipat! ✨",
            "Saya layak menikmati kelimpahan ini.",
            "Semakin banyak saya memberi, semakin banyak yang datang.",
            "Uang mengalir kepada saya dengan mudah.",
            "Kekayaan saya terus bertumbuh setiap saat.",
            "Saya bebas secara finansial & penuh syukur."
        ];

        // Init App
        window.onload = () => {
            updateUI();
            renderHistory();
            renderWishlist();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js');
            }
        };

        function formatCurrency(n) { 
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n); 
        }

        function updateUI() {
            document.getElementById('balance-text').innerText = formatCurrency(balance);
            localStorage.setItem('hb_balance', balance);
            localStorage.setItem('hb_history', JSON.stringify(historyData));
            localStorage.setItem('hb_wishlist', JSON.stringify(wishlistData));
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        function switchTab(tab) {
            const histSec = document.getElementById('section-history');
            const wishSec = document.getElementById('section-wishlist');
            const tabH = document.getElementById('tab-history');
            const tabW = document.getElementById('tab-wishlist');

            if(tab === 'history') {
                histSec.classList.remove('hidden'); wishSec.classList.add('hidden');
                tabH.classList.add('tab-active'); tabW.classList.remove('tab-active');
                tabW.classList.add('text-slate-400'); tabH.classList.remove('text-slate-400');
            } else {
                histSec.classList.add('hidden'); wishSec.classList.remove('hidden');
                tabW.classList.add('tab-active'); tabH.classList.remove('tab-active');
                tabH.classList.add('text-slate-400'); tabW.classList.remove('text-slate-400');
            }
        }

        function showAffirmation() {
            const msg = affirmations[Math.floor(Math.random() * affirmations.length)];
            const container = document.getElementById('toast-container');
            container.innerHTML = ''; // Bersihkan yang lama

            const toast = document.createElement('div');
            toast.className = "bg-slate-900/90 text-white p-5 rounded-2xl shadow-2xl text-center backdrop-blur-md border border-white/20 animate-bounce-subtle pointer-events-auto";
            toast.innerHTML = `
                <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest mb-1">Berhasil Dialirkan</p>
                <p class="text-sm font-medium">✨ ${msg}</p>
            `;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = "opacity 0.5s ease";
                toast.style.opacity = "0";
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        function processTopUp() {
            const val = parseInt(document.getElementById('topup-amount').value);
            if(val > 0) {
                balance += val;
                addHistory("Rejeki Masuk", val, 'in');
                updateUI();
                toggleModal('topup-modal');
                document.getElementById('topup-amount').value = '';
            }
        }

        function processSpend() {
            const name = document.getElementById('spend-name').value;
            const amount = parseInt(document.getElementById('spend-amount').value);
            if(name && amount > 0 && balance >= amount) {
                balance -= amount;
                addHistory(name, amount, 'out');
                updateUI();
                showAffirmation();
                toggleModal('spend-modal');
                document.getElementById('spend-name').value = '';
                document.getElementById('spend-amount').value = '';
            } else if (balance < amount) {
                alert("Visualisasikan saldo lebih banyak! ✨");
            }
        }

        function addHistory(name, amount, type) {
            const time = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            historyData.unshift({ name, amount, type, time });
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('section-history');
            container.innerHTML = historyData.length === 0 ? '<p class="text-center text-slate-400 py-10 italic text-xs">Belum ada aliran dana...</p>' : '';
            historyData.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-white p-4 rounded-2xl shadow-sm border border-slate-100 animate-item mb-3";
                div.innerHTML = `<div><p class="font-bold text-sm">${item.name}</p><p class="text-[9px] text-slate-400">${item.time}</p></div>
                                  <p class="font-bold ${item.type==='in'?'text-green-500':'text-slate-700'}">${item.type==='in'?'+':'-'} ${formatCurrency(item.amount).replace('Rp','')}</p>`;
                container.appendChild(div);
            });
            updateUI();
        }

        function addWish() {
            const name = document.getElementById('wish-name').value;
            const amount = parseInt(document.getElementById('wish-amount').value);
            if(name && amount > 0) {
                wishlistData.unshift({ name, amount });
                renderWishlist();
                toggleModal('wishlist-modal');
                document.getElementById('wish-name').value = '';
                document.getElementById('wish-amount').value = '';
            }
        }

        function renderWishlist() {
            const container = document.getElementById('section-wishlist');
            container.innerHTML = wishlistData.length === 0 ? '<p class="text-center text-slate-400 py-10 italic text-xs">Ayo tulis impianmu!</p>' : '';
            wishlistData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow-sm border border-indigo-50 animate-item mb-3";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <p class="font-bold text-indigo-900">${item.name}</p>
                        <p class="text-xs font-bold text-indigo-600">${formatCurrency(item.amount)}</p>
                    </div>
                    <button onclick="realizeWish(${index})" class="w-full bg-indigo-50 text-indigo-600 text-[10px] font-bold py-2 rounded-lg">WUDJUDKAN SEKARANG</button>
                `;
                container.appendChild(div);
            });
            updateUI();
        }

        function realizeWish(index) {
            const item = wishlistData[index];
            if(balance >= item.amount) {
                balance -= item.amount;
                addHistory("Impian: " + item.name, item.amount, 'out');
                wishlistData.splice(index, 1);
                renderWishlist();
                renderHistory();
                showAffirmation();
            } else {
                alert("Fokus pada rejeki datang agar ini segera terwujud! ✨");
            }
        }

        function clearHistory() {
    Swal.fire({
        title: 'Mulai Hari Baru?',
        text: "Riwayat aliran dana akan dibersihkan, namun saldo kelimpahan Anda tetap aman ✨",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#6366f1',
        cancelButtonColor: '#cbd5e1',
        confirmButtonText: 'Ya, Bersihkan!',
        cancelButtonText: 'Batal',
        background: '#ffffff',
        borderRadius: '20px',
        customClass: {
            popup: 'rounded-3xl',
            confirmButton: 'rounded-xl font-bold px-6 py-3',
            cancelButton: 'rounded-xl font-bold px-6 py-3'
        }
    }).then((result) => {
        if (result.isConfirmed) {
            // Proses pembersihan data
            historyData = [];
            renderHistory();
            
            // Notifikasi sukses yang cantik
            Swal.fire({
                title: 'Berhasil!',
                text: 'Lembaran baru telah dibuka. Siap menerima rejeki baru?',
                icon: 'success',
                timer: 2000,
                showConfirmButton: false,
                borderRadius: '20px'
            });
        }
    });
}

        
    </script>
</body>
</html>
